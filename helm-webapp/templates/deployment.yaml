apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  labels:
    app: {{ .Values.appName }}
spec:
  replicas: {{ .Values.replicas | default 3 }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
      tier: frontend
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        tier: frontend
    spec:
      containers:
      - name: mycontainer
        image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.port | default 80 }}
        envFrom:
        - configMapRef:
            name: {{ .Values.configmap.name }}
        resources:
          requests:
            memory: {{ .Values.resources.requests.memory | default "52Mi" | quote }}
            cpu: {{ .Values.resources.requests.cpu | default "50m" | quote }}
          limits:
            memory: {{ .Values.resources.limits.memory | default "128Mi" | quote }}
            cpu: {{ .Values.resources.limits.cpu | default "100m" | quote }}
            
